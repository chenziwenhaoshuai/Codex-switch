name: CodexSwitch
options:
  bundleIdPrefix: com.codexswitch
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

targets:
  CodexSwitch:
    type: application
    platform: macOS
    sources:
      - path: CodexSwitchApp
        excludes:
          - Resources
    resources:
      - path: CodexSwitchApp/Resources
        buildPhase: resources
      - path: CodexSwitchApp/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codexswitch.app
        PRODUCT_NAME: "Codex Switch"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_ENTITLEMENTS: CodexSwitchApp/CodexSwitchApp.entitlements
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
    entitlements:
      path: CodexSwitchApp/CodexSwitchApp.entitlements
