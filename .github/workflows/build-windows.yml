name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: CodexSwitchWin
        run: npm install

      - name: Build EXE
        working-directory: CodexSwitchWin
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex.Switch.Windows
          path: |
            CodexSwitchWin/dist/*.exe
