name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: "Upload built EXE files to a GitHub Release"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      release_tag:
        description: "Release tag to upload to when upload_to_release is true"
        required: false
        default: "v1.0.2"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: CodexSwitchWin/package-lock.json

      - name: Install
        working-directory: CodexSwitchWin
        run: npm ci

      - name: Build EXE
        working-directory: CodexSwitchWin
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex.Switch.Windows
          path: |
            CodexSwitchWin/dist/*.exe

      - name: Upload EXE to Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: |
            CodexSwitchWin/dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
